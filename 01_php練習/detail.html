<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ストアサイト</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/detail.css" />
  </head>
  <body>
    <!-- ヘッダー -->
    <header>
      <h1>ストアサイト</h1>
    </header>

    <!-- メイン -->
    <main>
      <!-- @01 商品詳細 ここから -->
      <section class="product_detail">
        <h2 class="product_name">商品名</h2>

        <!-- 画像と説明文【flex 横2列: 画像 + テキスト側】 -->
        <div class="product_inner">
          <!-- └ 画像（左） -->
          <div class="product_detail_img">
            <img src="img/item2.jpg" alt="椅子" />
          </div>
          <!-- └ テキスト側（右） -->
          <div class="product_detail_info">
            <h2 class="product_detail_title">プロダクトタイトルプロダクトタイトル</h2>
            <p class="product_detail_price">¥99,999 <br />+tax</p>
            <p class="product_detail_description">説明説明説明説明説明説明</p>
            <button class="product_detail_button">カートに入れる</button>
          </div>
        </div>
      </section>
      <!-- @01 商品詳細 ここまで -->
    </main>
  </body>
</html>
